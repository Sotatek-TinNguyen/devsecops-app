# ─────────────────────────────────────────────────────────────
# THỨ TỰ GATE = THỨ TỰ RUNTIME (rẻ/nhanh trước, đắt/chậm sau) -> fail fast.
# Sâu hơn tốc độ: mọi gate NGUỒN đứng TRƯỚC bước ký. cosign ghi chữ ký vào
# Rekor = log CÔNG KHAI, append-only, gần như không xoá được -> không thứ gì
# được ký + phơi vĩnh viễn trừ khi đã qua hết secret/SAST/SCA/image scan.
# Đặt gate trước ký là giảm blast radius của chính hành động ký, không chỉ
# tiết kiệm phút runner.
#
# (Trạng thái từng bước KHÔNG ghi ở đây — xem docs/RoadMap.md của repo infra.
#  Comment trong code stale nhanh hơn ta cập nhật; file này chỉ mô tả THỨ TỰ.)
#
#   gate-common (1 lần):  gitleaks (secret)                     <- 6a
#   mỗi service (matrix): Semgrep (SAST) -> Trivy SCA (dep)     <- 6b
#                         -> build -> Trivy image -> push       <- 6c
#                         -> cosign sign -> syft SBOM + attest  <- 6d
#                         -> verify sign + verify-attestation   <- 6e
#                         (SARIF cả 3 tool -> tab Security       <- 6f)
#
# gitleaks TÁCH khỏi matrix: secret không thuộc riêng service nào; đỏ ở
# gate-common -> skip CẢ hai leg TRƯỚC khi build. Semgrep/Trivy nằm TRONG
# matrix -> chỉ đỏ leg bẩn, leg sạch vẫn xanh (giữ bằng chứng "currency ĐỎ,
# productcatalog XANH cùng một run" cho bước cắm-CVE).
# ─────────────────────────────────────────────────────────────
name: build-sign-push

on:
  push:
    branches: [main]
    # EXPAND: nới từ 2 service cụ thể sang `src/**`. Để nguyên thì sau này push
    # sửa adservice sẽ KHÔNG kích CI — im lặng, không báo lỗi, chỉ là gate
    # không bao giờ chạy. Đổi lại: matrix build MỌI service trên MỌI thay đổi
    # trong src/ (lọc động `dorny/paths-filter` vẫn đang hoãn) -> tốn runner,
    # chấp nhận ở lab.
    paths:
      - "src/**"
      - ".github/workflows/build-sign-push.yml"
  workflow_dispatch:

# Least privilege ở tầng workflow — mặc định của GitHub rộng hơn mức cần.
permissions:
  contents: read
  # BẮT BUỘC. Thiếu dòng này runner không xin được token OIDC -> chết CẢ hai:
  # assume role AWS lẫn cosign keyless (cả hai đều tiêu thụ cùng một token).
  id-token: write

env:
  AWS_REGION: ap-southeast-1

jobs:
  # ─────────────────────────────────────────────────────────────
  # GATE CHUNG — chạy MỘT lần, KHÔNG theo matrix. Secret không thuộc riêng
  # service nào (cả hai leg cùng soi một cây mã) -> để trong matrix là quét
  # lặp vô ích. Tách ra + matrix `needs:` job này -> secret rò rỉ chặn CẢ
  # pipeline trước khi bất cứ gì được build/push/ký.
  # ─────────────────────────────────────────────────────────────
  gate-common:
    name: gate-common (gitleaks)
    runs-on: ubuntu-latest
    #runs-on: self-hosted
    # Least privilege TẦNG JOB: job này chỉ checkout để quét, KHÔNG cần OIDC.
    # Khai `contents: read` -> id-token tụt về NONE cho RIÊNG job này (perms
    # tầng job THAY THẾ tầng workflow, không cộng dồn) -> gate-common không hề
    # có khả năng xin token AWS/cosign. Chỉ job build mới giữ id-token:write.
    permissions:
      contents: read
      # 6f: BẮT BUỘC để đẩy SARIF lên code scanning. Khai ở TẦNG JOB chứ không
      # nới ở tầng workflow -> chỉ job cần mới có, và gate-common VẪN không có
      # id-token (boundary cũ không suy suyển).
      security-events: write
    steps:
      - uses: actions/checkout@v4

      # Pin 8.30.1 — TRÙNG gitleaks trong pre-commit repo infra: dev quét local
      # và CI quét bằng CÙNG ruleset, không lệch phiên bản luật. Tải từ release
      # chính thức qua HTTPS; tên asset đã xác minh tồn tại trước khi ghi vào đây.
      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            -o "$RUNNER_TEMP/gitleaks.tar.gz"
          tar -xzf "$RUNNER_TEMP/gitleaks.tar.gz" -C "$RUNNER_TEMP" gitleaks
          chmod +x "$RUNNER_TEMP/gitleaks"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/gitleaks" version

      # `dir .` = quét CÂY LÀM VIỆC hiện tại, KHÔNG phải full git history.
      # Fork mang 2709 commit của Google -> quét history mỗi push là (a) lặp
      # việc đã xác minh sạch, (b) COUPLING gate với code ta không sở hữu: một
      # luật gitleaks mới trúng commit cũ của Google = gate đỏ vì thứ ngoài
      # thay đổi của Raf. checkout mặc định depth=1 là đủ vì chỉ soi cây hiện tại.
      #
      # KHÔNG scope theo service (khác Semgrep 6b): secret rò rỉ ở BẤT KỲ file
      # nào cũng là sự cố phải xử -> quét cả cây. Semgrep thì scope src/SERVICE
      # vì lỗi chất lượng code chỉ ở code TA nuôi mới là trách nhiệm của ta.
      #
      # `--redact`: trúng thì KHÔNG in giá trị secret ra log (in ra = lộ lại
      # lần nữa, ngay trong artifact công khai). Exit 1 mặc định khi có leak
      # -> đỏ job.
      #
      # 6f: thêm `--report-*` -> MỘT lần chạy vừa gác cổng vừa đẻ SARIF. Không
      # phải tool nào cũng làm được vậy (Trivy/Semgrep chỉ nhận 1 format/lần
      # -> ở 6f-2 phải chạy 2 lượt). Verify local 8.30.1: cây SẠCH vẫn ghi file
      # SARIF 2.1.0 hợp lệ (0 results) + exit 0 -> upload dưới không bao giờ
      # đứng trước file rỗng.
      - name: gitleaks (secret scan)
        run: gitleaks dir . --redact --verbose --report-format sarif --report-path gitleaks.sarif

      # `if: always()` là CẢ Ý NGHĨA của step này, không phải cho chắc.
      # Thiếu nó: có leak -> step trên đỏ -> step này bị SKIP -> tab Security
      # trống RÕ ĐÚNG LÚC CÓ PHÁT HIỆN. Tức là công cụ báo cáo im lặng đúng
      # lúc cần nó nhất — hỏng ngược, kiểu hỏng tệ nhất của một hệ thống cảnh báo.
      #
      # `category` phải DUY NHẤT cho mỗi (tool × đối tượng quét): code scanning
      # gom kết quả theo category, hai lần upload cùng category thì lần sau ĐÈ
      # lần trước. gate-common chỉ có 1 lượt quét nên "gitleaks" là đủ; ở 6f-2
      # matrix 2 leg thì phải kèm tên service.
      - name: Upload gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

  build-sign-push:
    # Tên có ${{ matrix.service }} -> UI hiện 2 dòng phân biệt được, thay vì
    # hai job trùng tên. Quan trọng lúc debug và lúc chụp màn hình làm portfolio.
    name: build-sign-push (${{ matrix.service }})
    runs-on: ubuntu-latest
    #runs-on: self-hosted
    # Không build/ký nếu secret scan chưa xanh. gate-common đỏ -> CẢ hai leg
    # matrix bị skip; không gì được build, push, hay ghi vào Rekor.
    needs: gate-common

    strategy:
      # KHÔNG fail-fast. Mặc định GitHub là true: leg nào đỏ trước sẽ HỦY leg
      # còn lại đang chạy. Ở bước 7 ta CỐ TÌNH cắm CVE vào currencyservice —
      # bằng chứng cần thấy là "productcatalog XANH, currency ĐỎ" trong cùng
      # một run, tức gate chặn CHỌN LỌC đúng service bẩn. fail-fast: true giết
      # mất đúng cái bằng chứng đó, chỉ còn "pipeline chết" — vô nghĩa.
      fail-fast: false
      # EXPAND: `service: [a, b]` -> `include:` để mỗi service mang THAM SỐ
      # RIÊNG. Bắt buộc vì các service không cùng hình dạng: cartservice để
      # Dockerfile ở `src/cartservice/src/` và `COPY cartservice.csproj .` nên
      # build context phải là thư mục con đó, không phải `src/cartservice`.
      #
      # `mode` là CHUỖI, cố ý KHÔNG dùng boolean. Với boolean, một giá trị lỡ
      # thành chuỗi "false" sẽ được GitHub coi là TRUTHY -> bật gate ở service
      # đang định observe (hoặc ngược lại), và sai kiểu đó KHÔNG hiện ra ở đâu
      # cả. So sánh chuỗi `mode == 'observe'` thì không có vùng xám nào.
      #   enforce = CVE chặn merge/push (chuẩn của 2 service template)
      #   observe = vẫn quét + vẫn đẩy SARIF lên tab Security, nhưng KHÔNG chặn
      #
      # ⚠️ Nói thẳng cái giá của `observe`: image dính CVE VẪN được push và VẪN
      # được ký. Chữ ký nói "đây đúng là thứ CI của tôi build", nó KHÔNG nói
      # "thứ này an toàn". Đây là bước quá độ có chủ đích, không phải mặc định
      # vĩnh viễn — mỗi service dọn xong thì đổi sang `enforce`.
      #
      # `sast` tách riêng khỏi `mode`: ký một artifact là bảo chứng về ARTIFACT;
      # chạy SAST và tuyên bố code sạch là claim về CODE TÔI VIẾT. Ta không viết
      # 9 service kia -> không đi tuyên bố thay Google. Cũng dùng chuỗi on/off
      # vì đúng cái bẫy truthiness ở trên.
      matrix:
        include:
          - service: productcatalogservice
            context: src/productcatalogservice
            dockerfile: src/productcatalogservice/Dockerfile
            mode: enforce
            sast: "on"
          - service: currencyservice
            context: src/currencyservice
            dockerfile: src/currencyservice/Dockerfile
            mode: enforce
            sast: "on"

          # ── EXPAND lô 1: 3 service Go ────────────────────────────────
          # Cùng hình dạng tuyệt đối với nhau (builder golang-alpine ->
          # distroless/static, `COPY go.mod go.sum` rồi `COPY . .`, context =
          # thư mục service) -> gộp 1 commit được: nếu đỏ thì đỏ vì CÙNG một
          # nguyên nhân, vẫn quy được. cartservice/adservice lệch chuẩn nên
          # tách commit riêng.
          #
          # `sast: "off"` — KHÔNG phải để cho dễ. Semgrep là claim về code TÔI
          # viết; 3 service này là code Google, ta chưa nhận trách nhiệm sửa nó
          # thì cũng không đi tuyên bố thay. Trivy/gitleaks thì vẫn chạy đủ:
          # chúng nói về ARTIFACT ta build và ký, không phải về quyền tác giả.
          #
          # `mode: enforce` từ EXP-3b-2 — vòng observe->enforce đã ĐI HẾT, ghi lại
          # nguyên vòng vì đây mới là thứ chứng minh `observe` là bước quá độ chứ
          # không phải chỗ giấu nợ:
          #
          #   EXP-3a (observe)  gate đo được: checkout 10 SCA / 11 image,
          #                     frontend 1/2, shipping 1/2. Trong đó
          #                     GHSA-hrxh-6v49-42gf (grpc) CHÍNH LÀ CVE đã vá cho
          #                     productcatalogservice ở 6b — mỗi service có
          #                     `go.mod` RIÊNG nên **vá một service không vá cả
          #                     đội hình** (I-029). Monorepo != chung dep tree.
          #   EXP-3b-1          vá: grpc 1.82.1 + x/crypto 0.52.0 + builder
          #                     golang 1.26.5 + base :nonroot@sha256 (khoảng
          #                     trống 5a). Vẫn observe.
          #   EXP-3b-2 (đây)    run 30022514990: **13/13 category = 0**, gồm cả 3
          #                     ô trivy-image. Lật enforce trên BẰNG CHỨNG, không
          #                     phải trên niềm tin.
          #
          # ⚠️ Vì sao phải chờ CI mới lật được, dù local đã 0: `trivy fs` đọc
          # source nên KHÔNG BAO GIỜ thấy CVE-2026-39822 (Go stdlib biên dịch vào
          # binary). Digest sai hay toolchain không lên 1.26.5 thì local vẫn ra 0
          # y hệt. Chỉ `trivy-image-*` phân biệt được. **Gate nào không đọc được
          # thứ nó định quét thì con số 0 của nó không có nghĩa** (I-027).
          #
          # `sast` vẫn "off": ta đã vá dependency và Dockerfile của 3 service này,
          # nhưng KHÔNG viết code Go của chúng. Ký artifact là bảo chứng về
          # artifact; chạy SAST rồi tuyên bố code sạch là claim về quyền tác giả.
          # Hai việc khác nhau, đừng nhập một.
          - service: checkoutservice
            context: src/checkoutservice
            dockerfile: src/checkoutservice/Dockerfile
            mode: enforce
            sast: "off"
          - service: frontend
            context: src/frontend
            dockerfile: src/frontend/Dockerfile
            mode: enforce
            sast: "off"
          - service: shippingservice
            context: src/shippingservice
            dockerfile: src/shippingservice/Dockerfile
            mode: enforce
            sast: "off"

          # ── EXPAND lô 2: 1 service Node (paymentservice) ──────────────
          # `mode: enforce` từ EXP-3c-2 — cùng vòng observe->vá->đọc->enforce như
          # lô Go, nhưng lô này còn dạy một bài SCA không thấy được:
          #
          #   EXP-3c (observe)   gate đo: 32 SCA / 41 image. Chênh 9 = 5 package
          #                      (underscore/lodash/tmp/linkify-it) mà `npm install`
          #                      kéo về NGOÀI lockfile -> `trivy fs` MÙ, chỉ image
          #                      scan thấy. Thủ phạm CVE = @google-cloud/profiler
          #                      + exporter-otlp-grpc, trùng currencyservice.
          #   EXP-3c-1a          vá dep: gỡ profiler + override + `npm install` ->
          #                      `npm ci` (buộc image == lockfile, dọn 5 image-
          #                      only). run 30047506307: image 41 -> 0. Observe.
          #   EXP-3c-1b          harden: alpine -> distroless nonroot. run
          #                      30048354075: image vẫn 0 — nhưng giờ "0" là nhờ
          #                      .trivyignore suppress 6 libssl3, KHÁC 3c-1a (0
          #                      thật). Observe.
          #   EXP-3c-2 (đây)     đọc trivy-image=0 ở cả hai run -> enforce.
          #
          # ⚠️ Bài của lô này (I-030): `npm install` phá vỡ giả định của SCA — nó
          # cài package ngoài lockfile nên `trivy fs` (đọc lock) báo sạch hơn
          # image THẬT. `npm ci` mới khiến lock == artifact. "Gate có đọc được
          # thứ nó quét không" (I-027) ở tầng sâu hơn: thứ nó đọc (lock) có phản
          # ánh đúng artifact (image) không.
          #
          # `sast: "off"` — payment là code Google (như 3 Go), ta đưa vào chuỗi
          # build+ký nhưng không tuyên bố quyền tác giả. currency `sast: on` vì
          # là 1 trong 2 service TA NHẬN NUÔI.
          - service: paymentservice
            context: src/paymentservice
            dockerfile: src/paymentservice/Dockerfile
            mode: enforce
            sast: "off"

          # ── EXPAND lô 3: 3 service Python ─────────────────────────────
          # `mode: observe` — baseline đo local 2026-07-24 (đúng lệnh gate), cả 3
          # đều có HIGH fixable:
          #   emailservice          pyasn1 3H + urllib3 2H  (5)
          #   recommendationservice pyasn1 3H + urllib3 2H  (5, y HỆT email —
          #                         chung requirements)
          #   shoppingassistant     21: cryptography · langchain-core · langsmith
          #                         · pillow (10H!) · pyasn1 · urllib3 — stack
          #                         langchain dày, giống currency/payment ở chỗ
          #                         hệ sinh thái lớn = bề mặt CVE lớn.
          # Onboard observe TRƯỚC để đọc baseline THẬT trên CI (nhất là image
          # scan — lớp OS alpine/slim mà `trivy fs` mù), rồi vá ở 3d-1, flip
          # enforce ở 3d-2. KHÔNG vá mù theo `trivy fs` local (I-029/I-030).
          #
          # `sast: "off"` — code Google (như 3 Go + payment). SAST là claim về
          # code TA viết; ta chỉ đưa 3 service này vào chuỗi build+ký.
          #
          # 3 đứa CÙNG hình dạng (multi-stage python, `pip install
          # requirements.txt`, COPY site-packages, ENTRYPOINT python) nên gộp 1
          # commit onboard — đỏ thì đỏ cùng nguyên nhân. email/recommendation
          # base `alpine`, shoppingassistant base `slim` (Debian) — khác biệt đó
          # để 3d-1 harden xử, onboard chưa đụng.
          # ── EXPAND lô 3 → enforce (3d-2) ──────────────────────────────
          # Cả 3 qua vòng observe→vá→harden→đọc→enforce như lô Go/Node:
          #   3d      onboard observe; baseline 5/5/21 (SCA==image, không I-030)
          #   3d-1a   email+recommendation: pyasn1 0.6.4 + urllib3 2.7.0
          #   3d-1b   shoppingassistant: pillow 12.3.0 + cryptography/langchain-
          #           core/langsmith/pyasn1/urllib3 (uv --python-platform LINUX,
          #           không Mac — import smoke xác nhận langchain-core 1.5.1
          #           không break API)
          #   3d-1c   nonroot cả 3
          #   3d-2    run 30056224745: 6 category Python = 0 → enforce
          # ⚠️ shoppingassistant vẫn còn nợ RUNTIME `aiohttp` (pre-existing, xem
          # "Việc đang TREO"): enforce ở đây bảo chứng ARTIFACT (build+scan+ký),
          # KHÔNG bảo chứng nó CHẠY được. Phải xử aiohttp trước khi P3 deploy.
          - service: emailservice
            context: src/emailservice
            dockerfile: src/emailservice/Dockerfile
            mode: enforce
            sast: "off"
          - service: recommendationservice
            context: src/recommendationservice
            dockerfile: src/recommendationservice/Dockerfile
            mode: enforce
            sast: "off"
          - service: shoppingassistantservice
            context: src/shoppingassistantservice
            dockerfile: src/shoppingassistantservice/Dockerfile
            mode: enforce
            sast: "off"

          # ── EXPAND lô 4: 2 service LỆCH CHUẨN (adservice Gradle, cartservice
          #    .NET) — I-027: cả hai THIẾU lockfile nên Trivy SCA MÙ ────────────
          # Onboard `observe`. KHÁC 3 lô trước ở chỗ: baseline observe ở đây là
          # một PHÉP THỬ, không chỉ đếm CVE. Câu hỏi phải trả lời trước khi tin
          # bất kỳ số 0 nào: "gate có ĐỌC ĐƯỢC artifact không?" (I-027, giờ soi
          # lên chính image gate).
          #   - SCA (`trivy fs`) CHẮC CHẮN mù: không lockfile thì không có gì để
          #     đọc → nó sẽ ra 0 vì KHÔNG THẤY, không phải vì sạch.
          #   - image (`trivy image`) thì đọc dep ĐÃ BIÊN DỊCH trong artifact:
          #     cartservice `.deps.json` (do `dotnet publish` ship) + adservice
          #     JAR (do `installDist`). KHÔNG cần lockfile.
          # Cách kiểm image gate có tự mù không: đọc SBOM (bước verify-attestation
          # đã decode + đếm package) — nếu SBOM liệt kê Grpc.AspNetCore/Npgsql
          # (cart) và JAR hipstershop (ad) thì image analyzer THẤY dep → 0 của nó
          # có nghĩa. Nếu SBOM chỉ có package OS/base → image cũng mù → lúc đó
          # lockfile mới là bắt buộc (cài dotnet/gradle SDK).
          #
          # ⚠️ Vì thế: khi flip enforce (3e/3f-2), gate trên IMAGE scan ĐÃ verify-
          # không-mù, TUYỆT ĐỐI KHÔNG trên SCA=0 (số mù). Và ghi rõ trong RoadMap
          # "SCA=0 là MÙ, không phải SẠCH".
          #
          # `sast: "off"` — code Google. cartservice ĐÃ nonroot (USER 1000 +
          # chiseled base) — không cần harden. adservice chạy ROOT → cần commit
          # harden riêng. cartservice Dockerfile ở `src/cartservice/src/` +
          # `COPY cartservice.csproj .` → context là thư mục con đó, không phải
          # `src/cartservice`.
          # adservice → enforce (3e-2): run 30063284772 image=0 (netty family
          # force 4.1.136 + jackson 2.22.1 + 4 OS CVE ignored). Vòng
          # observe→vá→harden→đọc→enforce:
          #   3ef   onboard observe; baseline image=20 (netty×7, jackson, OS×4)
          #   3e-1  force netty family + jackson + .trivyignore OS (build vỡ lần
          #         đầu vì tcnative sub-family lọt force → fix prefix exclude)
          #   3e-1b nonroot
          #   3e-2  đọc image=0 → enforce
          # Lật trên IMAGE scan (đã verify-không-mù: 20 JAR CVE ban đầu chứng minh
          # Trivy đọc được artifact), KHÔNG trên SCA=0 (mù, thiếu lockfile).
          # ⚠️ SCA mù như cartservice: sinh `gradle.lockfile` (pending #7) để
          # un-blind phải làm lúc observe, kẻo đỏ service đã enforce.
          - service: adservice
            context: src/adservice
            dockerfile: src/adservice/Dockerfile
            mode: enforce
            sast: "off"
          # cartservice → enforce (3f): run 30060905472 image=0. Enforce trên
          # IMAGE scan ĐÃ verify-không-mù (SBOM 41 gói > chiseled OS-only ~10 →
          # syft catalog .NET deps → Trivy image cũng đọc `.deps.json`), TUYỆT
          # ĐỐI KHÔNG trên SCA=0 (số MÙ vì thiếu lockfile). Đã harden sẵn
          # (USER 1000 + chiseled) nên không cần commit harden/vá.
          # ⚠️ SCA vẫn MÙ: nếu sau này sinh `packages.lock.json` (pending #7) để
          # un-blind, SCA có thể lộ CVE → phải làm lúc service ở observe hoặc
          # chấp nhận đưa tạm về observe, kẻo đỏ service đã enforce.
          - service: cartservice
            context: src/cartservice/src
            dockerfile: src/cartservice/src/Dockerfile
            mode: enforce
            sast: "off"

    # Đặt ở tầng JOB, KHÔNG phải tầng workflow: `matrix` context chưa tồn tại
    # lúc GitHub đọc `env:` toàn cục -> để trên đó lỗi ngay
    # "Unrecognized named-value: 'matrix'". Ở đây thì hợp lệ — và nhờ vậy mọi
    # step bên dưới giữ nguyên ${SERVICE}, không phải sửa một dòng nào.
    env:
      SERVICE: ${{ matrix.service }}

    # 6f-2: job này TRƯỚC GIỜ không khai `permissions` -> thừa hưởng tầng
    # workflow. Vừa khai ra là THAY THẾ toàn bộ, KHÔNG cộng dồn (đúng cơ chế đã
    # ghi ở gate-common) -> phải liệt kê LẠI `id-token: write`, quên là cosign
    # keyless + assume role AWS chết cùng lúc. Khai tường minh ở đây thay vì nới
    # `security-events` ở tầng workflow: job nào cần thì job đó xin.
    permissions:
      contents: read
      id-token: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      # ── 6b: GATE NGUỒN theo service, chèn TRƯỚC "Assume AWS role" ──
      # Cả hai đứng trước OIDC/build/ký: code chưa qua static check thì KHÔNG
      # tiêu tốn credential AWS, và tuyệt đối không gì được ký + ghi Rekor.
      # Nằm TRONG matrix (khác gitleaks ở gate-common) -> chỉ đỏ leg bẩn, leg
      # sạch vẫn xanh = giữ bằng chứng "currency ĐỎ, productcatalog XANH cùng
      # một run" cho bước cắm-CVE (7).

      # SAST = lỗi trong code TA viết (khác gitleaks: secret; khác Trivy SCA:
      # lỗi trong lib người khác). Pin 1.170.0 = bản đã verify local.
      - name: Install Semgrep
        run: |
          set -euo pipefail
          pipx install semgrep==1.170.0
          # pipx trên GitHub-hosted runner đặt shim ở /opt/pipx_bin (PIPX_BIN_DIR
          # image cài sẵn), KHÔNG phải ~/.local/bin -> hỏi pipx thay vì đoán.
          BIN_DIR="$(pipx environment --value PIPX_BIN_DIR)"
          echo "$BIN_DIR" >> "$GITHUB_PATH"
          "$BIN_DIR/semgrep" --version

      # Scope src/SERVICE: quét cả repo sẽ báo code 9 service Google không thuộc
      # trách nhiệm mình = nhiễu. p/ci = ruleset bảo mật registry; --severity
      # ERROR chỉ chặn phát hiện độ tin cậy cao (bỏ WARNING/INFO khỏi gate);
      # --error = exit!=0 khi có finding -> đỏ leg. --metrics off: không gửi
      # telemetry. Baseline verify local: 0 finding cả 2 service.
      # 6f-2: HAI lượt chạy, cố ý. Trivy/Semgrep chỉ nhận MỘT format mỗi lần
      # (khác gitleaks ở 6f-1 làm được cả hai trong 1 lượt).
      #   lượt 1 = báo cáo: xuất SARIF, KHÔNG `--error` -> luôn exit 0.
      #   lượt 2 = gác cổng: giữ NGUYÊN TỪNG KÝ TỰ dòng cũ.
      # Giữ nguyên dòng gate là có chủ đích: nếu CI đỏ sau commit này thì chắc
      # chắn KHÔNG phải vì tôi đụng vào ngưỡng chặn. Giá phải trả là quét 2 lần
      # (rule/DB đã cache nên lượt 2 nhanh) — chấp nhận ở 2 service; lúc expand
      # 11 service thì đây là chỗ đầu tiên phải tối ưu.
      - name: Semgrep SARIF (report)
        if: matrix.sast == 'on'
        run: semgrep scan --config p/ci --severity ERROR --metrics off --sarif --output semgrep.sarif "src/${SERVICE}"

      # `continue-on-error` là CÁCH DUY NHẤT bật/tắt chặn mà KHÔNG đụng vào
      # dòng lệnh: lệnh giữ nguyên byte cho mọi service, chỉ hậu quả của exit
      # code là đổi. Nếu thay bằng cách ghép cờ `--error` theo điều kiện thì
      # mỗi service chạy một lệnh khác nhau -> lúc debug không còn biết đang so
      # sánh cái gì với cái gì.
      - name: Semgrep (SAST)
        id: semgrep
        if: matrix.sast == 'on'
        continue-on-error: ${{ matrix.mode == 'observe' }}
        run: semgrep scan --config p/ci --severity ERROR --error --metrics off "src/${SERVICE}"

      # Guard viết dài dòng CÓ LÝ DO: `always()` một mình sẽ chạy step này kể cả
      # khi các step trên bị SKIP (vd Semgrep SARIF hỏng) -> upload vấp file
      # không tồn tại -> đỏ vì lý do vặt. Bắt buộc conclusion phải là
      # success/failure = "step đã THỰC SỰ chạy", chứ không dựa vào việc đoán
      # context trả gì cho step chưa chạy.
      - name: Upload Semgrep SARIF
        if: always() && (steps.semgrep.conclusion == 'success' || steps.semgrep.conclusion == 'failure')
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          # category PHẢI kèm tên service: 2 leg matrix upload cùng lúc, trùng
          # category thì leg sau ĐÈ kết quả leg trước -> mất nửa số phát hiện
          # mà tab Security vẫn trông "bình thường".
          category: semgrep-${{ matrix.service }}

      # Pin trivy v0.72.0, tải từ release chính thức (KHÔNG `curl|sh` từ main —
      # kém sạch trong đúng project về supply-chain); tên asset đã xác minh tồn
      # tại trước khi ghi URL. Đồng bộ cách hand-install gitleaks ở 6a.
      # ── EXP-4: cache vuln-DB (trivy-db + trivy-java-db) ─────────────
      # Trivy kéo 2 DB từ ghcr: `trivy-db` và `trivy-java-db` (nặng, chỉ leg Java
      # = adservice dùng — chính nó tìm ra netty/jackson JAR CVE). 11 leg pull
      # song song mỗi run → dễ dính `TOOMANYREQUESTS` của ghcr ẩn danh. Cache cả
      # thư mục `~/.cache/trivy` mua được ĐỘ TIN CẬY, không chỉ vài giây.
      #
      # KEY XOAY THEO NGÀY — đây là núm CHÍNH XÁC, không phải tối ưu vặt: key tĩnh
      # + `--skip-db-update` sẽ ĐÓNG BĂNG DB → gate ĐÃ enforce âm thầm quét bằng DB
      # cũ → image dính CVE mới nổ hôm nay vẫn PASS xanh (đúng bẫy I-012, tệ hơn
      # vì lặng lẽ). Key `trivy-db-<YYYY-MM-DD>`: cùng ngày restore → Trivy thấy DB
      # còn tươi (TTL nội bộ) → tự bỏ qua pull (không cần `--skip-db-update`);
      # sang ngày mới key đổi → miss → pull DB mới. Cache do đó THUẦN HOÁ I-012:
      # trong ngày kết quả gate tái lập, độ trễ CVE ≤ 1 ngày. `restore-keys` để
      # ngày đầu chưa có cache thì mượn tạm cache hôm trước rồi Trivy tự update.
      - name: Trivy DB cache key (rotate daily)
        id: trivycache
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
      - name: Cache Trivy vuln DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ steps.trivycache.outputs.date }}
          restore-keys: |
            trivy-db-

      - name: Install Trivy
        run: |
          set -euo pipefail
          VERSION=0.72.0
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${VERSION}/trivy_${VERSION}_Linux-64bit.tar.gz" \
            -o "$RUNNER_TEMP/trivy.tar.gz"
          tar -xzf "$RUNNER_TEMP/trivy.tar.gz" -C "$RUNNER_TEMP" trivy
          chmod +x "$RUNNER_TEMP/trivy"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/trivy" --version

      # SCA = CVE đã biết trong DEPENDENCY (quét lockfile, CHƯA cần build image
      # — khác Trivy image ở 6c quét cả filesystem image). --ignore-unfixed:
      # chỉ chặn CVE CÓ bản vá; CVE chưa có fix mà chặn thì pipeline kẹt cứng
      # không hành động được (bẫy "đỏ vì thứ không sửa nổi") -> chính sách gate
      # = "phải áp bản vá có sẵn". CRITICAL,HIGH mới chặn. Baseline verify local
      # ĐÚNG lệnh này: exit 0 cả 2 service sau khi 6-pre dọn currencyservice.
      # ── EXP-4: quét MỘT lần → convert HAI lần (thay vì scan 2 lượt) ──
      # 6f-2 trước đây chạy `trivy fs` 2 lần (report + gate) để giữ NGUYÊN BYTE
      # dòng gate — bảo hiểm lúc mới thêm gate, đỏ thì chắc chắn không do đụng
      # ngưỡng. Giờ gate ổn định (11 service enforce xanh) nên bỏ bảo hiểm đó
      # được. `trivy convert` đọc lại 1 file JSON và xuất SARIF HOẶC áp exit-code
      # — verify local 0.72.0: convert honor `--exit-code` (JSON bẩn→1, sạch→0)
      # và SARIF ra đúng 2.1.0. Lợi: đọc lockfile/filesystem CHỈ MỘT lần.
      # Report convert đặt TRƯỚC gate convert có chủ đích: gate enforce đỏ →
      # step sau skip, nhưng SARIF đã sinh xong → `Upload` (if:always) vẫn có
      # file → tab Security KHÔNG trống đúng lúc có phát hiện (giữ đúng tính chất
      # của 6f, không phải phá nó).
      - name: Trivy SCA scan (JSON, once)
        run: trivy fs --scanners vuln --severity CRITICAL,HIGH --ignore-unfixed --format json --output trivy-sca.json "src/${SERVICE}"

      - name: Trivy SCA SARIF (report, convert)
        run: trivy convert --format sarif --output trivy-sca.sarif trivy-sca.json

      - name: Trivy SCA gate (dependencies)
        id: sca
        continue-on-error: ${{ matrix.mode == 'observe' }}
        run: trivy convert --exit-code 1 trivy-sca.json

      - name: Upload Trivy SCA SARIF
        if: always() && (steps.sca.conclusion == 'success' || steps.sca.conclusion == 'failure')
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-sca.sarif
          category: trivy-sca-${{ matrix.service }}

      # Bước in OIDC claims đã bị xóa sau khi nghiệm thu xong (run 29722880189):
      # sub thật khớp tuyệt đối `github_actions_expected_sub` của Terraform.
      # Cần dựng lại khi debug: xem git history của file này.
      #
      # ⚠️ CẢNH BÁO TƯƠNG LAI: ĐỔI TÊN hoặc CHUYỂN CHỦ repo sẽ làm subject claim
      # đổi theo (GitHub cập nhật immutable claim khi rename/transfer) -> trust
      # policy hết khớp -> CI chết. Đổi tên repo thì phải sửa `github_repo` /
      # `github_repo_id` bên infra/bootstrap rồi apply lại.
      - name: Assume AWS role via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Để ở repo VARIABLE (không phải secret): ARN không bí mật, nhưng
          # chứa account ID -> giữ ngoài file commit của repo public.
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 6c: tách "Build and push" cũ thành build → quét IMAGE → push ──
      # Quét TRƯỚC push: image bẩn (CVE ở lớp OS/base + thứ nướng vào image —
      # cái Trivy SCA đọc-lockfile ở 6b KHÔNG thấy) tuyệt đối không chạm ECR.
      # Ba step rời -> đỏ quy đúng step (build vỡ ≠ image bẩn ≠ push lỗi).
      - name: Build image
        id: build
        run: |
          set -euo pipefail
          IMAGE="${{ steps.ecr.outputs.registry }}/${SERVICE}"
          # Tag = commit SHA -> truy vết ngược từ image về đúng dòng code.
          # ECR đang IMMUTABLE: push LẠI cùng tag sẽ bị từ chối (chống tag-swap,
          # không phải lỗi). Chạy lại trên cùng code: `git commit --allow-empty`.
          TAG="${GITHUB_SHA::12}"
          # `-f` + context tách rời: KHÔNG suy ra được từ tên service. cartservice
          # có Dockerfile ở src/cartservice/src/ và `COPY cartservice.csproj .`
          # -> context phải trỏ đúng thư mục chứa csproj, sai là build vỡ ở dòng
          # COPY chứ không phải ở chỗ dễ nhìn.
          docker build -t "$IMAGE:$TAG" -f "${{ matrix.dockerfile }}" "${{ matrix.context }}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"

      # Quét chính IMAGE vừa build (còn ở docker local, CHƯA push). Cùng chính
      # sách 6b: --ignore-unfixed + CRITICAL,HIGH. Blocking cho 2 service nuôi
      # (đã sạch); khi expand 11 -> bọc step này bằng cờ `enforce` per-service
      # (model B: observe rồi enforce). DB vuln đã cache từ Trivy SCA -> không
      # tải lại 100MB.
      # EXP-4: cũng quét-một-lần-convert-hai. Với image, unpack filesystem của
      # image là chi phí THẬT (nặng hơn đọc lockfile) → quét 1 lần càng đáng.
      # Cùng thứ tự: report convert TRƯỚC gate convert (SARIF luôn sẵn cho upload
      # kể cả khi gate enforce đỏ).
      - name: Trivy image scan (JSON, once)
        run: trivy image --scanners vuln --severity CRITICAL,HIGH --ignore-unfixed --format json --output trivy-image.json "${{ steps.build.outputs.image }}:${{ steps.build.outputs.tag }}"

      - name: Trivy image SARIF (report, convert)
        run: trivy convert --format sarif --output trivy-image.sarif trivy-image.json

      - name: Trivy image gate
        id: imagescan
        continue-on-error: ${{ matrix.mode == 'observe' }}
        run: trivy convert --exit-code 1 trivy-image.json

      # Đây là SARIF nói về ARTIFACT (lớp OS + base), khác trivy-sca nói về
      # DEPENDENCY khai trong lockfile -> hai category riêng, đừng gộp: gộp thì
      # mất khả năng trả lời "CVE này đến từ code tôi khai hay từ base image?".
      - name: Upload Trivy image SARIF
        if: always() && (steps.imagescan.conclusion == 'success' || steps.imagescan.conclusion == 'failure')
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image-${{ matrix.service }}

      # Chỉ push khi image QUA quét. DIGEST (băm nội dung image) chỉ có SAU push,
      # là thứ đem đi ký — tag đổi được, digest thì không.
      - name: Push image
        id: push
        run: |
          set -euo pipefail
          REF_TAG="${{ steps.build.outputs.image }}:${{ steps.build.outputs.tag }}"
          docker push "$REF_TAG"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$REF_TAG" | cut -d@ -f2)
          [ -n "$DIGEST" ] || { echo "::error::không lấy được digest sau khi push"; exit 1; }
          echo "ref=${{ steps.build.outputs.image }}@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Đã push: ${{ steps.build.outputs.image }}@${DIGEST}"

      - uses: sigstore/cosign-installer@v3

      # KEYLESS: không có private key nào tồn tại, ở đâu cả.
      # cosign đổi token OIDC của chính workflow này lấy chứng chỉ NGẮN HẠN từ
      # Fulcio, ký, rồi ghi bằng chứng vào log công khai append-only Rekor.
      # Danh tính người ký = "workflow X của repo Y trên nhánh main", chứ không
      # phải "ai đó đang giữ file key". Không có key -> không có key để lộ, để
      # xoay vòng, hay để mất.
      - name: Sign image (keyless)
        run: cosign sign --yes "${{ steps.push.outputs.ref }}"

      # Verify ngay trong pipeline: chữ ký vô nghĩa nếu chưa từng ai kiểm.
      # Đây chính là phép kiểm mà Kyverno sẽ làm trong cluster ở P3 — chạy sớm
      # ở đây để biết nó PASS trước khi đem vào admission control.
      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ steps.push.outputs.ref }}"

      # ── 6d: SBOM KÝ ĐƯỢC ─────────────────────────────────────────────
      # Chữ ký ở trên trả lời "AI build cái này". SBOM trả lời "TRONG NÀY CÓ GÌ".
      # Thiếu vế hai thì hôm CVE mới nổ, câu "image đang chạy có dính không?"
      # chỉ trả lời được bằng cách build lại rồi quét — tức là ĐOÁN về quá khứ,
      # trên một image có thể không tái lập được (xem I-024 build chưa reproducible).
      #
      # `cosign attest` KHÁC `cosign attach sbom`: attach chỉ ĐÍNH KÈM file
      # (không ai ký, ai sửa cũng được, không có bằng chứng nguồn gốc); attest
      # bọc SBOM trong in-toto attestation rồi KÝ + ghi Rekor -> SBOM thành lời
      # khai CÓ CHỮ KÝ, gắn cứng vào DIGEST. Đây là thứ Kyverno ở P3 kiểm được
      # (`verifyImages` đọc được cả signature lẫn attestation).
      - name: Install syft (pin 1.49.0)
        run: |
          set -euo pipefail
          SYFT_VERSION=1.49.0
          curl -sSfL -o syft.tar.gz \
            "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          tar -xzf syft.tar.gz syft
          sudo install -m 0755 syft /usr/local/bin/syft
          syft version

      # Nguồn quét = IMAGE, không phải source tree: SBOM phải kê thứ THẬT SỰ nằm
      # trong artifact (gồm cả package của lớp base), chứ không phải thứ lockfile
      # hứa hẹn — đúng cùng lý do 6c quét image chứ không chỉ `trivy fs`.
      # Dùng `docker:` (image còn trong daemon local sau push) thay vì `registry:`
      # -> khỏi pull lại, khỏi phụ thuộc syft có đọc được token ECR hay không.
      # Cùng digest = cùng bytes nên SBOM không đổi; và subject của attestation
      # vẫn là DIGEST ở step dưới, không phải cái tag ta quét.
      - name: Generate SBOM (SPDX-JSON)
        run: |
          set -euo pipefail
          syft scan "docker:${{ steps.build.outputs.image }}:${{ steps.build.outputs.tag }}" \
            -o spdx-json="sbom-${SERVICE}.spdx.json"
          # Chặn SBOM RỖNG đi tiếp: file 0 package vẫn ký được -> attestation
          # hợp lệ về mặt mật mã nhưng nội dung vô nghĩa. Thà đỏ ở đây còn hơn
          # ký một lời khai trống rồi tin vào nó ở P3.
          jq -e '.packages | length > 0' "sbom-${SERVICE}.spdx.json" > /dev/null
          echo "SBOM: $(jq '.packages | length' "sbom-${SERVICE}.spdx.json") packages"

      # Ký SBOM và gắn vào DIGEST (không phải tag).
      # KHÔNG dùng `--replace`: nó xoá-rồi-ghi-lại tag `sha256-<digest>.att`, mà
      # ECR đang IMMUTABLE -> bị từ chối. Mỗi commit ra digest mới nên tag .att
      # luôn mới, không đụng nhau; muốn chạy lại trên cùng code thì
      # `git commit --allow-empty` (cùng cách xử như push image ở 6c).
      # `--type spdxjson` phải KHỚP TỪNG KÝ TỰ với `--type` ở 6e verify-attestation
      # — verify khớp theo predicateType, lệch một ký tự là 6e đỏ.
      - name: Attest SBOM (keyless)
        run: |
          cosign attest --yes \
            --type spdxjson \
            --predicate "sbom-${SERVICE}.spdx.json" \
            "${{ steps.push.outputs.ref }}"

      # ── 6e: SOI LẠI CHÍNH THỨ VỪA KÝ ─────────────────────────────────
      # Cùng lý do "Verify signature" tồn tại ở 6c: lời khai chưa ai kiểm thì
      # chưa phải bằng chứng. Ở đây kiểm 3 tầng, mỗi tầng bịt một cách gian:
      #
      #   (1) chữ ký trên attestation hợp lệ + DANH TÍNH đúng workflow của repo
      #       này  -> chặn "ai đó cũng ký được rồi đính vào digest của tôi".
      #   (2) --type spdxjson  -> chặn "có attestation NÀO ĐÓ là coi như đạt".
      #       Thiếu cờ này, một predicate loại khác vẫn làm verify xanh: ta sẽ
      #       tin mình có SBOM trong khi thứ đính kèm là cái khác hẳn.
      #   (3) GIẢI MÃ payload rồi ĐỐI CHIẾU với file SBOM trên đĩa -> chặn
      #       "verify xanh nhưng nội dung rỗng/không phải cái ta vừa sinh".
      #       Đây là chỗ nhiều pipeline dừng quá sớm: cosign chỉ nói "có chữ ký
      #       hợp lệ", KHÔNG nói "bên trong đúng thứ anh nghĩ".
      #
      # (Kiểm NỘI DUNG theo chính sách — vd "cấm license GPL" — là `--policy`
      #  CUE/Rego, để dành P5 hardening.)
      - name: Verify attestation
        run: |
          set -euo pipefail
          # stdout = DSSE envelope (JSON); stderr = dòng xác nhận của cosign,
          # cố ý KHÔNG nuốt để log còn đọc được.
          ATT_JSON=$(cosign verify-attestation \
            --type spdxjson \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ steps.push.outputs.ref }}")

          # `jq -s` để phòng trường hợp có nhiều envelope trên stdout; lấy cái đầu.
          PAYLOAD=$(printf '%s' "$ATT_JSON" | jq -rs '.[0].payload' | base64 -d)

          # `(.Data // .)` = bóc vỏ nếu có, không thì dùng thẳng. cosign gói
          # predicate SBOM tuỳ phiên bản: có bản đặt SPDX doc ở `.predicate`,
          # có bản bọc thêm `.predicate.Data`. Viết chịu được CẢ HAI rẻ hơn
          # nhiều so với đoán đúng một dạng — và không phụ thuộc version cosign.
          # (Nếu đoán sai: `null | length` = 0, lọt qua `set -e`, chết ở phép so
          #  sánh dưới dạng "0 gói khác 65 gói" -> đọc nhầm thành lệch NỘI DUNG
          #  trong khi thật ra chỉ là lệch HÌNH DẠNG. Bẫy này khó nhìn ra.)
          PKGS_ATT=$(printf '%s' "$PAYLOAD" | jq '.predicate | (.Data // .) | .packages | length')
          PKGS_LOCAL=$(jq '.packages | length' "sbom-${SERVICE}.spdx.json")

          if [ "$PKGS_ATT" != "$PKGS_LOCAL" ]; then
            echo "::error::SBOM trong attestation ($PKGS_ATT gói) KHÁC SBOM vừa sinh ($PKGS_LOCAL gói)"
            # In cấu trúc statement để lần sau debug 1 lượt, khỏi đoán.
            printf '%s' "$PAYLOAD" | jq '{predicateType, subject, predicate_keys: (.predicate | keys)}'
            exit 1
          fi
          echo "Attestation khớp: $PKGS_ATT gói, predicateType=$(printf '%s' "$PAYLOAD" | jq -r .predicateType)"
