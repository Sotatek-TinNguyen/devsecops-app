# ─────────────────────────────────────────────────────────────
# THỨ TỰ GATE = THỨ TỰ RUNTIME (rẻ/nhanh trước, đắt/chậm sau) -> fail fast.
# Sâu hơn tốc độ: mọi gate NGUỒN đứng TRƯỚC bước ký. cosign ghi chữ ký vào
# Rekor = log CÔNG KHAI, append-only, gần như không xoá được -> không thứ gì
# được ký + phơi vĩnh viễn trừ khi đã qua hết secret/SAST/SCA/image scan.
# Đặt gate trước ký là giảm blast radius của chính hành động ký, không chỉ
# tiết kiệm phút runner.
#
# (Trạng thái từng bước KHÔNG ghi ở đây — xem docs/RoadMap.md của repo infra.
#  Comment trong code stale nhanh hơn ta cập nhật; file này chỉ mô tả THỨ TỰ.)
#
#   gate-common (1 lần):  gitleaks (secret)                     <- 6a
#   mỗi service (matrix): Semgrep (SAST) -> Trivy SCA (dep)     <- 6b
#                         -> build -> Trivy image -> push       <- 6c
#                         -> cosign sign -> syft SBOM + attest  <- 6d
#                         -> verify sign + verify-attestation   <- 6e
#                         (SARIF cả 3 tool -> tab Security       <- 6f)
#
# gitleaks TÁCH khỏi matrix: secret không thuộc riêng service nào; đỏ ở
# gate-common -> skip CẢ hai leg TRƯỚC khi build. Semgrep/Trivy nằm TRONG
# matrix -> chỉ đỏ leg bẩn, leg sạch vẫn xanh (giữ bằng chứng "currency ĐỎ,
# productcatalog XANH cùng một run" cho bước cắm-CVE).
# ─────────────────────────────────────────────────────────────
name: build-sign-push

on:
  push:
    branches: [main]
    paths:
      - "src/productcatalogservice/**"
      - "src/currencyservice/**"
      - ".github/workflows/build-sign-push.yml"
  workflow_dispatch:

# Least privilege ở tầng workflow — mặc định của GitHub rộng hơn mức cần.
permissions:
  contents: read
  # BẮT BUỘC. Thiếu dòng này runner không xin được token OIDC -> chết CẢ hai:
  # assume role AWS lẫn cosign keyless (cả hai đều tiêu thụ cùng một token).
  id-token: write

env:
  AWS_REGION: ap-southeast-1

jobs:
  # ─────────────────────────────────────────────────────────────
  # GATE CHUNG — chạy MỘT lần, KHÔNG theo matrix. Secret không thuộc riêng
  # service nào (cả hai leg cùng soi một cây mã) -> để trong matrix là quét
  # lặp vô ích. Tách ra + matrix `needs:` job này -> secret rò rỉ chặn CẢ
  # pipeline trước khi bất cứ gì được build/push/ký.
  # ─────────────────────────────────────────────────────────────
  gate-common:
    name: gate-common (gitleaks)
    runs-on: ubuntu-latest
    # Least privilege TẦNG JOB: job này chỉ checkout để quét, KHÔNG cần OIDC.
    # Khai `contents: read` -> id-token tụt về NONE cho RIÊNG job này (perms
    # tầng job THAY THẾ tầng workflow, không cộng dồn) -> gate-common không hề
    # có khả năng xin token AWS/cosign. Chỉ job build mới giữ id-token:write.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Pin 8.30.1 — TRÙNG gitleaks trong pre-commit repo infra: dev quét local
      # và CI quét bằng CÙNG ruleset, không lệch phiên bản luật. Tải từ release
      # chính thức qua HTTPS; tên asset đã xác minh tồn tại trước khi ghi vào đây.
      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            -o "$RUNNER_TEMP/gitleaks.tar.gz"
          tar -xzf "$RUNNER_TEMP/gitleaks.tar.gz" -C "$RUNNER_TEMP" gitleaks
          chmod +x "$RUNNER_TEMP/gitleaks"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/gitleaks" version

      # `dir .` = quét CÂY LÀM VIỆC hiện tại, KHÔNG phải full git history.
      # Fork mang 2709 commit của Google -> quét history mỗi push là (a) lặp
      # việc đã xác minh sạch, (b) COUPLING gate với code ta không sở hữu: một
      # luật gitleaks mới trúng commit cũ của Google = gate đỏ vì thứ ngoài
      # thay đổi của Raf. checkout mặc định depth=1 là đủ vì chỉ soi cây hiện tại.
      #
      # KHÔNG scope theo service (khác Semgrep 6b): secret rò rỉ ở BẤT KỲ file
      # nào cũng là sự cố phải xử -> quét cả cây. Semgrep thì scope src/SERVICE
      # vì lỗi chất lượng code chỉ ở code TA nuôi mới là trách nhiệm của ta.
      #
      # `--redact`: trúng thì KHÔNG in giá trị secret ra log (in ra = lộ lại
      # lần nữa, ngay trong artifact công khai). Exit 1 mặc định khi có leak
      # -> đỏ job. Xuất SARIF lên tab Security để ở 6f.
      - name: gitleaks (secret scan)
        run: gitleaks dir . --redact --verbose

  build-sign-push:
    # Tên có ${{ matrix.service }} -> UI hiện 2 dòng phân biệt được, thay vì
    # hai job trùng tên. Quan trọng lúc debug và lúc chụp màn hình làm portfolio.
    name: build-sign-push (${{ matrix.service }})
    runs-on: ubuntu-latest

    # Không build/ký nếu secret scan chưa xanh. gate-common đỏ -> CẢ hai leg
    # matrix bị skip; không gì được build, push, hay ghi vào Rekor.
    needs: gate-common

    strategy:
      # KHÔNG fail-fast. Mặc định GitHub là true: leg nào đỏ trước sẽ HỦY leg
      # còn lại đang chạy. Ở bước 7 ta CỐ TÌNH cắm CVE vào currencyservice —
      # bằng chứng cần thấy là "productcatalog XANH, currency ĐỎ" trong cùng
      # một run, tức gate chặn CHỌN LỌC đúng service bẩn. fail-fast: true giết
      # mất đúng cái bằng chứng đó, chỉ còn "pipeline chết" — vô nghĩa.
      fail-fast: false
      matrix:
        service: [productcatalogservice, currencyservice]

    # Đặt ở tầng JOB, KHÔNG phải tầng workflow: `matrix` context chưa tồn tại
    # lúc GitHub đọc `env:` toàn cục -> để trên đó lỗi ngay
    # "Unrecognized named-value: 'matrix'". Ở đây thì hợp lệ — và nhờ vậy mọi
    # step bên dưới giữ nguyên ${SERVICE}, không phải sửa một dòng nào.
    env:
      SERVICE: ${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      # ── 6b: GATE NGUỒN theo service, chèn TRƯỚC "Assume AWS role" ──
      # Cả hai đứng trước OIDC/build/ký: code chưa qua static check thì KHÔNG
      # tiêu tốn credential AWS, và tuyệt đối không gì được ký + ghi Rekor.
      # Nằm TRONG matrix (khác gitleaks ở gate-common) -> chỉ đỏ leg bẩn, leg
      # sạch vẫn xanh = giữ bằng chứng "currency ĐỎ, productcatalog XANH cùng
      # một run" cho bước cắm-CVE (7).

      # SAST = lỗi trong code TA viết (khác gitleaks: secret; khác Trivy SCA:
      # lỗi trong lib người khác). Pin 1.170.0 = bản đã verify local.
      - name: Install Semgrep
        run: |
          set -euo pipefail
          pipx install semgrep==1.170.0
          # pipx trên GitHub-hosted runner đặt shim ở /opt/pipx_bin (PIPX_BIN_DIR
          # image cài sẵn), KHÔNG phải ~/.local/bin -> hỏi pipx thay vì đoán.
          BIN_DIR="$(pipx environment --value PIPX_BIN_DIR)"
          echo "$BIN_DIR" >> "$GITHUB_PATH"
          "$BIN_DIR/semgrep" --version

      # Scope src/SERVICE: quét cả repo sẽ báo code 9 service Google không thuộc
      # trách nhiệm mình = nhiễu. p/ci = ruleset bảo mật registry; --severity
      # ERROR chỉ chặn phát hiện độ tin cậy cao (bỏ WARNING/INFO khỏi gate);
      # --error = exit!=0 khi có finding -> đỏ leg. --metrics off: không gửi
      # telemetry. Baseline verify local: 0 finding cả 2 service.
      - name: Semgrep (SAST)
        run: semgrep scan --config p/ci --severity ERROR --error --metrics off "src/${SERVICE}"

      # Pin trivy v0.72.0, tải từ release chính thức (KHÔNG `curl|sh` từ main —
      # kém sạch trong đúng project về supply-chain); tên asset đã xác minh tồn
      # tại trước khi ghi URL. Đồng bộ cách hand-install gitleaks ở 6a.
      - name: Install Trivy
        run: |
          set -euo pipefail
          VERSION=0.72.0
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${VERSION}/trivy_${VERSION}_Linux-64bit.tar.gz" \
            -o "$RUNNER_TEMP/trivy.tar.gz"
          tar -xzf "$RUNNER_TEMP/trivy.tar.gz" -C "$RUNNER_TEMP" trivy
          chmod +x "$RUNNER_TEMP/trivy"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/trivy" --version

      # SCA = CVE đã biết trong DEPENDENCY (quét lockfile, CHƯA cần build image
      # — khác Trivy image ở 6c quét cả filesystem image). --ignore-unfixed:
      # chỉ chặn CVE CÓ bản vá; CVE chưa có fix mà chặn thì pipeline kẹt cứng
      # không hành động được (bẫy "đỏ vì thứ không sửa nổi") -> chính sách gate
      # = "phải áp bản vá có sẵn". CRITICAL,HIGH mới chặn. Baseline verify local
      # ĐÚNG lệnh này: exit 0 cả 2 service sau khi 6-pre dọn currencyservice.
      - name: Trivy SCA (dependencies)
        run: trivy fs --scanners vuln --severity CRITICAL,HIGH --ignore-unfixed --exit-code 1 "src/${SERVICE}"

      # Bước in OIDC claims đã bị xóa sau khi nghiệm thu xong (run 29722880189):
      # sub thật khớp tuyệt đối `github_actions_expected_sub` của Terraform.
      # Cần dựng lại khi debug: xem git history của file này.
      #
      # ⚠️ CẢNH BÁO TƯƠNG LAI: ĐỔI TÊN hoặc CHUYỂN CHỦ repo sẽ làm subject claim
      # đổi theo (GitHub cập nhật immutable claim khi rename/transfer) -> trust
      # policy hết khớp -> CI chết. Đổi tên repo thì phải sửa `github_repo` /
      # `github_repo_id` bên infra/bootstrap rồi apply lại.
      - name: Assume AWS role via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Để ở repo VARIABLE (không phải secret): ARN không bí mật, nhưng
          # chứa account ID -> giữ ngoài file commit của repo public.
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 6c: tách "Build and push" cũ thành build → quét IMAGE → push ──
      # Quét TRƯỚC push: image bẩn (CVE ở lớp OS/base + thứ nướng vào image —
      # cái Trivy SCA đọc-lockfile ở 6b KHÔNG thấy) tuyệt đối không chạm ECR.
      # Ba step rời -> đỏ quy đúng step (build vỡ ≠ image bẩn ≠ push lỗi).
      - name: Build image
        id: build
        run: |
          set -euo pipefail
          IMAGE="${{ steps.ecr.outputs.registry }}/${SERVICE}"
          # Tag = commit SHA -> truy vết ngược từ image về đúng dòng code.
          # ECR đang IMMUTABLE: push LẠI cùng tag sẽ bị từ chối (chống tag-swap,
          # không phải lỗi). Chạy lại trên cùng code: `git commit --allow-empty`.
          TAG="${GITHUB_SHA::12}"
          docker build -t "$IMAGE:$TAG" "src/${SERVICE}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"

      # Quét chính IMAGE vừa build (còn ở docker local, CHƯA push). Cùng chính
      # sách 6b: --ignore-unfixed + CRITICAL,HIGH. Blocking cho 2 service nuôi
      # (đã sạch); khi expand 11 -> bọc step này bằng cờ `enforce` per-service
      # (model B: observe rồi enforce). DB vuln đã cache từ Trivy SCA -> không
      # tải lại 100MB.
      - name: Trivy image scan
        run: trivy image --scanners vuln --severity CRITICAL,HIGH --ignore-unfixed --exit-code 1 "${{ steps.build.outputs.image }}:${{ steps.build.outputs.tag }}"

      # Chỉ push khi image QUA quét. DIGEST (băm nội dung image) chỉ có SAU push,
      # là thứ đem đi ký — tag đổi được, digest thì không.
      - name: Push image
        id: push
        run: |
          set -euo pipefail
          REF_TAG="${{ steps.build.outputs.image }}:${{ steps.build.outputs.tag }}"
          docker push "$REF_TAG"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$REF_TAG" | cut -d@ -f2)
          [ -n "$DIGEST" ] || { echo "::error::không lấy được digest sau khi push"; exit 1; }
          echo "ref=${{ steps.build.outputs.image }}@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Đã push: ${{ steps.build.outputs.image }}@${DIGEST}"

      - uses: sigstore/cosign-installer@v3

      # KEYLESS: không có private key nào tồn tại, ở đâu cả.
      # cosign đổi token OIDC của chính workflow này lấy chứng chỉ NGẮN HẠN từ
      # Fulcio, ký, rồi ghi bằng chứng vào log công khai append-only Rekor.
      # Danh tính người ký = "workflow X của repo Y trên nhánh main", chứ không
      # phải "ai đó đang giữ file key". Không có key -> không có key để lộ, để
      # xoay vòng, hay để mất.
      - name: Sign image (keyless)
        run: cosign sign --yes "${{ steps.push.outputs.ref }}"

      # Verify ngay trong pipeline: chữ ký vô nghĩa nếu chưa từng ai kiểm.
      # Đây chính là phép kiểm mà Kyverno sẽ làm trong cluster ở P3 — chạy sớm
      # ở đây để biết nó PASS trước khi đem vào admission control.
      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ steps.push.outputs.ref }}"

      # ── 6d: SBOM KÝ ĐƯỢC ─────────────────────────────────────────────
      # Chữ ký ở trên trả lời "AI build cái này". SBOM trả lời "TRONG NÀY CÓ GÌ".
      # Thiếu vế hai thì hôm CVE mới nổ, câu "image đang chạy có dính không?"
      # chỉ trả lời được bằng cách build lại rồi quét — tức là ĐOÁN về quá khứ,
      # trên một image có thể không tái lập được (xem I-024 build chưa reproducible).
      #
      # `cosign attest` KHÁC `cosign attach sbom`: attach chỉ ĐÍNH KÈM file
      # (không ai ký, ai sửa cũng được, không có bằng chứng nguồn gốc); attest
      # bọc SBOM trong in-toto attestation rồi KÝ + ghi Rekor -> SBOM thành lời
      # khai CÓ CHỮ KÝ, gắn cứng vào DIGEST. Đây là thứ Kyverno ở P3 kiểm được
      # (`verifyImages` đọc được cả signature lẫn attestation).
      - name: Install syft (pin 1.49.0)
        run: |
          set -euo pipefail
          SYFT_VERSION=1.49.0
          curl -sSfL -o syft.tar.gz \
            "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          tar -xzf syft.tar.gz syft
          sudo install -m 0755 syft /usr/local/bin/syft
          syft version

      # Nguồn quét = IMAGE, không phải source tree: SBOM phải kê thứ THẬT SỰ nằm
      # trong artifact (gồm cả package của lớp base), chứ không phải thứ lockfile
      # hứa hẹn — đúng cùng lý do 6c quét image chứ không chỉ `trivy fs`.
      # Dùng `docker:` (image còn trong daemon local sau push) thay vì `registry:`
      # -> khỏi pull lại, khỏi phụ thuộc syft có đọc được token ECR hay không.
      # Cùng digest = cùng bytes nên SBOM không đổi; và subject của attestation
      # vẫn là DIGEST ở step dưới, không phải cái tag ta quét.
      - name: Generate SBOM (SPDX-JSON)
        run: |
          set -euo pipefail
          syft scan "docker:${{ steps.build.outputs.image }}:${{ steps.build.outputs.tag }}" \
            -o spdx-json="sbom-${SERVICE}.spdx.json"
          # Chặn SBOM RỖNG đi tiếp: file 0 package vẫn ký được -> attestation
          # hợp lệ về mặt mật mã nhưng nội dung vô nghĩa. Thà đỏ ở đây còn hơn
          # ký một lời khai trống rồi tin vào nó ở P3.
          jq -e '.packages | length > 0' "sbom-${SERVICE}.spdx.json" > /dev/null
          echo "SBOM: $(jq '.packages | length' "sbom-${SERVICE}.spdx.json") packages"

      # Ký SBOM và gắn vào DIGEST (không phải tag).
      # KHÔNG dùng `--replace`: nó xoá-rồi-ghi-lại tag `sha256-<digest>.att`, mà
      # ECR đang IMMUTABLE -> bị từ chối. Mỗi commit ra digest mới nên tag .att
      # luôn mới, không đụng nhau; muốn chạy lại trên cùng code thì
      # `git commit --allow-empty` (cùng cách xử như push image ở 6c).
      # `--type spdxjson` phải KHỚP TỪNG KÝ TỰ với `--type` ở 6e verify-attestation
      # — verify khớp theo predicateType, lệch một ký tự là 6e đỏ.
      - name: Attest SBOM (keyless)
        run: |
          cosign attest --yes \
            --type spdxjson \
            --predicate "sbom-${SERVICE}.spdx.json" \
            "${{ steps.push.outputs.ref }}"
